<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua - Explore the Ocean Depths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0A1628 0%, #0D2137 30%, #123456 60%, #1A5276 100%);
            color: #E0EAF0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E88E5, #00ACC1);
            border-radius: 18px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 16px;
            color: #7FB3D8;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .links a {
            display: block;
            width: 260px;
            padding: 14px 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #4FC3F7;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover {
            background: rgba(255,255,255,0.14);
        }
        .footer {
            margin-top: 60px;
            font-size: 13px;
            color: #5A9BBF;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">🌊</div>
        <h1>Aqua</h1>
        <p class="tagline">Explore the Ocean Depths</p>
        <div class="links">
            <a href="user-agreement.html">User Agreement</a>
            <a href="privacy-policy.html">Privacy Policy</a>
        </div>
        <div class="footer">
            <p>&copy; 2026 Aqua. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
